# docker-compose.prod.yml
# ============================================================
# 生产环境覆盖配置 — 与 docker-compose.yml 合并使用
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ======================================================
  # Nginx — 添加资源限制和日志持久化
  # ======================================================
  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256m"
        reservations:
          cpus: "0.25"
          memory: "128m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx

  # ======================================================
  # Frontend — 移除代码卷（使用构建产物）
  # ======================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # 移除 dev 模式的 dist 卷挂载，使用镜像内构建产物
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256m"
        reservations:
          cpus: "0.1"
          memory: "64m"

  # ======================================================
  # Backend — 使用 prod 构建目标，移除代码卷
  # ======================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod               # 使用 Gunicorn + Uvicorn workers
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # 生产环境移除热重载代码卷
    volumes:
      - uploads_data:/app/uploads
    environment:
      - APP_ENV=production
      - DEBUG=false
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2g"
        reservations:
          cpus: "0.5"
          memory: "512m"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: always
    # 生产环境不暴露端口（通过 Nginx 访问）
    # ports 保留用于内部监控，生产可用 Docker 网络

  # ======================================================
  # Celery Worker — 移除代码卷，添加资源限制
  # ======================================================
  celery-worker:
    volumes:
      - uploads_data:/app/uploads
    environment:
      - APP_ENV=production
      - DEBUG=false
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2g"
        reservations:
          cpus: "0.5"
          memory: "512m"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: always

  # ======================================================
  # PostgreSQL — 使用 Docker 命名卷（非 bind mount）
  # ======================================================
  postgres:
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512m"
        reservations:
          cpus: "0.25"
          memory: "256m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  # ======================================================
  # Redis — 使用 Docker 命名卷
  # ======================================================
  redis:
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "384m"
        reservations:
          cpus: "0.1"
          memory: "128m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  # ======================================================
  # ChromaDB — 使用 Docker 命名卷
  # ======================================================
  chromadb:
    volumes:
      - chromadb_data:/chroma/chroma
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"
        reservations:
          cpus: "0.25"
          memory: "256m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  # ======================================================
  # MinIO — 使用 Docker 命名卷
  # ======================================================
  minio:
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512m"
        reservations:
          cpus: "0.1"
          memory: "128m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

# ============================================================
# Docker 命名卷（生产推荐，与 bind mount 互斥）
# ============================================================
volumes:
  postgres_data:
    name: edu_postgres_data
  redis_data:
    name: edu_redis_data
  chromadb_data:
    name: edu_chromadb_data
  minio_data:
    name: edu_minio_data
  uploads_data:
    name: edu_uploads_data
  nginx_logs:
    name: edu_nginx_logs
