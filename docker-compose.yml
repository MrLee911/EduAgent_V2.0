# docker-compose.yml
# ============================================================
# 教学智能体（EduAgent）— 完整 8 服务编排（dev 模式）
# ============================================================

services:
  # ======================================================
  # 1. Nginx — 统一入口（前端 + API 代理）
  # ======================================================
  nginx:
    image: nginx:alpine
    container_name: edu-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 2. Frontend — Vue 3 SPA
  # ======================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edu-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 3. Backend — FastAPI 应用
  # ======================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: edu-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 4. Celery Worker — 异步任务处理
  # ======================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: edu-celery-worker
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 5. PostgreSQL — 业务数据库
  # ======================================================
  postgres:
    image: postgres:16-alpine
    container_name: edu-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edu_agent}
      POSTGRES_USER: ${POSTGRES_USER:-edu_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu_agent} -d ${POSTGRES_DB:-edu_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 6. Redis — 会话记忆 + Celery Broker + Token 黑名单
  # ======================================================
  redis:
    image: redis:7-alpine
    container_name: edu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 7. ChromaDB — 向量数据库
  # ======================================================
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: edu-chromadb
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - edu-net
    restart: unless-stopped

  # ======================================================
  # 8. MinIO — 对象存储（文件上传）
  # ======================================================
  minio:
    image: minio/minio:latest
    container_name: edu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - edu-net
    restart: unless-stopped

# ============================================================
# 网络定义
# ============================================================
networks:
  edu-net:
    driver: bridge
    name: edu-agent-network
